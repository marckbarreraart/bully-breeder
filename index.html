<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bully Breeder Demo</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  h1 {
    margin: 18px 0 5px;
  }

  .subtitle {
    color: #aaa;
    margin-bottom: 20px;
  }

  .app {
    width: 95%;
    max-width: 1250px;
    margin: auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  .card {
    background: #1d1d1d;
    border-radius: 18px;
    padding: 14px;
    box-shadow: 0 0 20px rgba(0,0,0,.4);
  }

  .card h2 {
    margin: 5px 0 12px;
  }

  .stage {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #f5f5f5;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }

  .layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

  button {
    background: #ff8c00;
    color: white;
    border: none;
    padding: 12px 18px;
    font-size: 15px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    margin: 10px 5px 5px;
  }

  button:hover {
    background: #ffaa33;
  }

  .breed-btn {
    background: #e63946;
    font-size: 18px;
    padding: 14px 28px;
    margin: 25px 0;
  }

  .info {
    margin-top: 10px;
    background: #111;
    padding: 10px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.45;
    min-height: 135px;
  }

  .badge {
    display: inline-block;
    background: #333;
    padding: 4px 8px;
    border-radius: 999px;
    margin-bottom: 6px;
    font-size: 12px;
    color: #ddd;
  }

  @media (max-width: 900px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<h1>🔥 Bully Breeder Demo 🔥</h1>
<div class="subtitle">Create a male, create a female, then breed an offspring.</div>

<div class="app">

  <div class="grid">

    <div class="card">
      <h2>Male</h2>
      <div class="stage" id="maleStage"></div>
      <button onclick="createMale()">Random Male</button>
      <div class="info" id="maleInfo">No male created yet.</div>
    </div>

    <div class="card">
      <h2>Female</h2>
      <div class="stage" id="femaleStage"></div>
      <button onclick="createFemale()">Random Female</button>
      <div class="info" id="femaleInfo">No female created yet.</div>
    </div>

    <div class="card">
      <h2>Offspring</h2>
      <div class="stage" id="offspringStage"></div>
      <button class="breed-btn" onclick="breedOffspring()">Breed Offspring</button>
      <div class="info" id="offspringInfo">Create both parents first.</div>
    </div>

  </div>

</div>

<script>
  const colors = [
    "black",
    "chocolate",
    "cream",
    "grey",
    "orange",
    "red",
    "white"
  ];

  const eyes = [
    "eyes-blue",
    "eyes-green",
    "eyes-orange",
    "eyes-red",
    "eyes-yellow"
  ];

  const noses = [
    "nose-black",
    "nose-chocolate",
    "nose-grey",
    "nose-pink",
    "nose-red"
  ];

  const snouts = [
    "snout",
    "snout-colmillos",
    "snout-smirk",
    "snout-tongue"
  ];

  const markBodies = [
    null,
    "mark-body-1",
    "mark-body-2",
    "mark-body-3",
    "mark-body-4",
    "mark-body-5"
  ];

  const markHeads = [
    null,
    "mark-head-1",
    "mark-head-2",
    "mark-head-3",
    "mark-head-4",
    "mark-head-5",
    "mark-head-6",
    "mark-head-7"
  ];

  const markTails = [
    null,
    "mark-tail"
  ];

  const earTypes = [
    "ears",
    "cropped-ears"
  ];

  let maleDog = null;
  let femaleDog = null;
  let offspringDog = null;

  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function inherit(maleTrait, femaleTrait, randomOptions) {
    const roll = Math.random();

    if (roll < 0.45) {
      return maleTrait;
    }

    if (roll < 0.90) {
      return femaleTrait;
    }

    return pick(randomOptions);
  }

  function createRandomDog(gender) {
    const color = pick(colors);

    return {
      gender: gender,
      color: color,
      earType: pick(earTypes),
      eye: pick(eyes),
      nose: pick(noses),
      snout: pick(snouts),
      markBody: pick(markBodies),
      markHead: pick(markHeads),
      markTail: pick(markTails)
    };
  }

  function createOffspring(male, female) {
    return {
      gender: pick(["male", "female"]),
      color: inherit(male.color, female.color, colors),
      earType: inherit(male.earType, female.earType, earTypes),
      eye: inherit(male.eye, female.eye, eyes),
      nose: inherit(male.nose, female.nose, noses),
      snout: inherit(male.snout, female.snout, snouts),
      markBody: inherit(male.markBody, female.markBody, markBodies),
      markHead: inherit(male.markHead, female.markHead, markHeads),
      markTail: inherit(male.markTail, female.markTail, markTails)
    };
  }

  function addLayer(stageId, folder, fileName) {
    if (!fileName) return;

    const img = document.createElement("img");
    img.className = "layer";
    img.src = `${folder}/${fileName}.png`;
    img.alt = fileName;

    img.onerror = () => {
      console.warn("Missing layer:", img.src);
      img.style.display = "none";
    };

    document.getElementById(stageId).appendChild(img);
  }

  function renderDog(stageId, dog) {
    const stage = document.getElementById(stageId);
    stage.innerHTML = "";

    if (!dog) return;

    const color = dog.color;

    // ORDEN CORRECTO DE CAPAS
    addLayer(stageId, "tail", `tail-${color}`);
    addLayer(stageId, "tail", dog.markTail);

    addLayer(stageId, "body", `body-${color}`);
    addLayer(stageId, "mark body", dog.markBody);

    if (dog.earType === "ears") {
      addLayer(stageId, "ears", `ears-${color}`);
    } else {
      addLayer(stageId, "cropped ears", `cropped-ears-${color}`);
    }

    addLayer(stageId, "head", `head-${color}`);
    addLayer(stageId, "mark head", dog.markHead);

    addLayer(stageId, "eyes", dog.eye);
    addLayer(stageId, "snout", dog.snout);
    addLayer(stageId, "nose", dog.nose);
  }

  function dogInfo(dog, label) {
    if (!dog) return `${label} not created yet.`;

    return `
      <span class="badge">${label}</span><br>
      <strong>Gender:</strong> ${dog.gender}<br>
      <strong>Color:</strong> ${dog.color}<br>
      <strong>Ears:</strong> ${dog.earType}<br>
      <strong>Eyes:</strong> ${dog.eye}<br>
      <strong>Nose:</strong> ${dog.nose}<br>
      <strong>Snout:</strong> ${dog.snout}<br>
      <strong>Body Mark:</strong> ${dog.markBody || "none"}<br>
      <strong>Head Mark:</strong> ${dog.markHead || "none"}<br>
      <strong>Tail Mark:</strong> ${dog.markTail || "none"}
    `;
  }

  function createMale() {
    maleDog = createRandomDog("male");
    renderDog("maleStage", maleDog);
    document.getElementById("maleInfo").innerHTML = dogInfo(maleDog, "Male");
  }

  function createFemale() {
    femaleDog = createRandomDog("female");
    renderDog("femaleStage", femaleDog);
    document.getElementById("femaleInfo").innerHTML = dogInfo(femaleDog, "Female");
  }

  function breedOffspring() {
    if (!maleDog || !femaleDog) {
      document.getElementById("offspringInfo").innerHTML = "Create both parents first.";
      return;
    }

    offspringDog = createOffspring(maleDog, femaleDog);
    renderDog("offspringStage", offspringDog);

    document.getElementById("offspringInfo").innerHTML = `
      ${dogInfo(offspringDog, "Offspring")}
      <br><br>
      <strong>Inheritance:</strong> 45% Male / 45% Female / 10% Random
    `;
  }

  createMale();
  createFemale();
</script>

</body>
</html>
